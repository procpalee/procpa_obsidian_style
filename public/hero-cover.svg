<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="1600" height="900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0b1830"/>
      <stop offset="55%" stop-color="#070a12"/>
      <stop offset="100%" stop-color="#040508"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7db0ff"/>
      <stop offset="100%" stop-color="#2f6bd6"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- faint contour curves -->
  <g fill="none" stroke="#5b9cff" stroke-opacity="0.07" stroke-width="1.5">
    <path d="M-50 250 C 300 120, 600 360, 900 220 S 1500 120, 1680 280"/>
    <path d="M-50 420 C 320 300, 640 520, 980 380 S 1520 300, 1680 440"/>
    <path d="M-50 620 C 360 500, 700 720, 1040 560 S 1560 500, 1680 640"/>
  </g>

  <!-- graph edges -->
  <g stroke="#5b9cff" stroke-opacity="0.16" stroke-width="1.2">
    <line x1="240" y1="200" x2="520" y2="330"/>
    <line x1="520" y1="330" x2="430" y2="610"/>
    <line x1="520" y1="330" x2="820" y2="250"/>
    <line x1="820" y1="250" x2="1120" y2="380"/>
    <line x1="820" y1="250" x2="980" y2="540"/>
    <line x1="1120" y1="380" x2="1340" y2="240"/>
    <line x1="1120" y1="380" x2="1280" y2="640"/>
    <line x1="980" y1="540" x2="730" y2="700"/>
    <line x1="430" y1="610" x2="730" y2="700"/>
    <line x1="240" y1="200" x2="160" y2="470"/>
    <line x1="160" y1="470" x2="430" y2="610"/>
  </g>

  <!-- glow halos for hub nodes -->
  <g filter="url(#soft)" fill="#3b82f6" fill-opacity="0.5">
    <circle cx="820" cy="250" r="26"/>
    <circle cx="1120" cy="380" r="20"/>
    <circle cx="520" cy="330" r="18"/>
  </g>

  <!-- nodes -->
  <g fill="url(#node)">
    <circle cx="240" cy="200" r="5"/>
    <circle cx="520" cy="330" r="9"/>
    <circle cx="820" cy="250" r="13"/>
    <circle cx="1120" cy="380" r="10"/>
    <circle cx="1340" cy="240" r="5"/>
    <circle cx="980" cy="540" r="7"/>
    <circle cx="1280" cy="640" r="6"/>
    <circle cx="730" cy="700" r="7"/>
    <circle cx="430" cy="610" r="8"/>
    <circle cx="160" cy="470" r="5"/>
  </g>
</svg>
